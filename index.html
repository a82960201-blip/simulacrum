<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="screen-orientation" content="landscape" />
  <title>JELLO — A Platformer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Rotate prompt (portrait mode only) -->
  <div id="rotatePrompt">
    <div class="rotateIcon">↻</div>
    <div>Rotate your device</div>
    <div style="font-size:11px;opacity:0.6;margin-top:6px;">This game is best in landscape</div>
  </div>

  <!-- Home screen overlay -->
  <div id="homeScreen">
    <canvas id="homeCanvas"></canvas>
    <div id="homeUI">
      <button id="playBtn">&#9654;&nbsp;&nbsp;PLAY</button>
      <div id="homeHint">SPACE or ENTER to start</div>
    </div>
  </div>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- Mobile HUD — hidden until game starts -->
  <div id="hud" style="display:none">
    <div id="leftControls">
      <div class="joystickZone" id="leftJoystick">
        <div class="joystickBase">
          <div class="joystickKnob" id="leftKnob"></div>
        </div>
        <div class="joystickLabel">MOVE</div>
      </div>
    </div>

    <div id="rightControls">
      <button id="dashBtn" style="display:none">
        <div class="btnIcon">&#9889;</div>
        <div class="btnName">DASH</div>
        <div class="btnBadge" id="dashCount"></div>
      </button>

      <button id="jumpBtn">
        <div class="btnIcon" id="jumpIcon">&#8593;</div>
        <div class="btnName" id="jumpLabel">JUMP</div>
      </button>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="theme.js"></script>
  <script src="world.js"></script>
  <script src="player.js"></script>
  <script src="slugs.js"></script>
  <script src="effects.js"></script>
  <script src="controls.js"></script>
  <script src="game.js"></script>
  <script src="homescreen.js"></script>
</body>
</html>
