name: Build APK (with PWA assets)

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Put web files into www/
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.css  www/ 2>/dev/null || true
          cp *.js   www/ 2>/dev/null || true
          cp manifest.json www/ 2>/dev/null || true
          cp sw.js         www/ 2>/dev/null || true
          cp icon-*.png    www/ 2>/dev/null || true

      - name: Add Android platform
        run: npx cap add android
        continue-on-error: true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: simulacrum-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk